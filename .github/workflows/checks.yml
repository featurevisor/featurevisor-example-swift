name: Checks

on:
  - push

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: Install dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run application
        run: swift run featurevisor-example-swift
